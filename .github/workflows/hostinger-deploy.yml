name: Deploy to Hostinger via FTP

on:
  push:
    branches:
      - main # Triggers on push to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
      
    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm' # Use 'bun' if you are using bun for lockfiles, but typical pipeline uses npm
        
    - name: 📦 Install dependencies
      run: npm install
      
    - name: 🏗️ Build project
      env:
        # Vite requires variables prefixed with VITE_ to bake them into the client build
        VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      run: npm run build
      
    - name: 🚀 Sync files to Hostinger
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: /public_html/ # Target directory on Hostinger
        local-dir: ./dist/ # Source directory from Vite build
